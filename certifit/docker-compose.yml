services:
  postgres:
    image: postgres:16
    container_name: certifit-postgres
    environment:
      POSTGRES_DB: certifit
      POSTGRES_USER: certifit
      POSTGRES_PASSWORD: certifit
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: